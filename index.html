<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Lane Broast | Karachi's Best</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --red: #d90429; --yellow: #ffb703; --dark: #1b1b1b; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: #f8f8f8; padding-bottom: 100px; }
        header { background: var(--red); color: white; padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Oswald', sans-serif; font-size: 26px; letter-spacing: 1px; }
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?auto=format&fit=crop&q=80&w=800'); background-size: cover; background-position: center; height: 180px; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .section-title { text-align: center; margin: 20px 0; font-family: 'Oswald', sans-serif; color: var(--red); font-size: 22px; text-transform: uppercase; }
        .menu-card { background: white; margin: 10px 15px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--yellow); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .item-info h3 { margin: 0; font-size: 17px; }
        .item-info p { margin: 4px 0 0; font-size: 11px; color: #777; }
        .price { font-weight: bold; color: var(--red); font-size: 18px; }
        .order-form { background: var(--dark); color: white; margin: 20px 15px; padding: 20px; border-radius: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 15px; box-sizing: border-box; }
        .submit-btn { background: var(--yellow); color: var(--dark); font-weight: bold; border: none; width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .whatsapp-float { position: fixed; bottom: 20px; left: 15px; right: 15px; background: #25d366; color: white; text-align: center; padding: 16px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 17px; box-shadow: 0 6px 20px rgba(0,0,0,0.3); z-index: 1000; }
    </style>
</head>
<body>

<header><div class="logo">Z-LANE BROAST</div></header>

<div class="hero">
    <div><h2 style="margin:0; font-size: 28px;">CRISPY & FRESH</h2><p>Authentic Karachi Taste</p></div>
</div>

<div class="section-title">Popular Items</div>

<div class="menu-card">
    <div class="item-info"><h3>Quarter Broast</h3><p>Chicken pc, Fries, Bun, Garlic Dip</p></div>
    <div class="price">Rs. 550</div>
</div>

<div class="menu-card">
    <div class="item-info"><h3>Half Broast</h3><p>2 Chicken pcs, Fries, 2 Buns, Dips</p></div>
    <div class="price">Rs. 1050</div>
</div>

<div class="menu-card">
    <div class="item-info"><h3>Z-Lane Burger</h3><p>Crispy Fillet, Lettuce, Special Mayo</p></div>
    <div class="price">Rs. 580</div>
</div>

<div class="order-form">
    <h3 style="text-align: center; margin: 0 0 15px 0; color: var(--yellow); font-family: 'Oswald';">DELIVERY FORM</h3>
    
    <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="32a9e73c-2934-4d31-b0ae-0cd37a3118eb">
        <input type="hidden" name="subject" value="New Order from Z-Lane Website">
        <input type="hidden" name="from_name" value="Z-Lane Broast Online">

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="tel" name="phone" placeholder="WhatsApp / Phone Number" required>
        <textarea name="address" placeholder="Full Delivery Address" rows="3" required></textarea>
        
        <select name="order_item">
            <option value="Quarter Broast">Quarter Broast</option>
            <option value="Half Broast">Half Broast</option>
            <option value="Z-Lane Burger">Z-Lane Burger</option>
        </select>

        <button type="submit" class="submit-btn">PLACE ORDER NOW</button>
    </form>
</div>

<a href="https://wa.me/923278467464?text=I%20want%20to%20order%20from%20Z-Lane%20Broast" class="whatsapp-float">
    ORDER VIA WHATSAPP 📲
</a>

</body>
</html>
